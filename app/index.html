<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenPets</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="pet" width="192" height="208"></canvas>
    <!--
      Sparkle particles for shiny variants render here, NOT on the pet
      canvas. ctx.filter applied to the canvas would tint the sparkles
      the wrong color; this layer sits above the canvas and is unaffected.
    -->
    <div id="sparkle-layer" aria-hidden="true"></div>
    <div id="bubble" aria-hidden="true"></div>
    <!--
      Right-click menu rendered inline within the pet window. We don't
      open a separate window: AppKit on macOS 26 reliably aborts when
      we class-swap a freshly-built transparent WKWebView panel
      mid-event-loop, so the safer (and cross-Space) approach is to
      live inside the pet's already-pinned NSPanel. The window grows
      vertically when the menu is open (see openInlineMenu in main.js).
    -->
    <div id="menu" hidden>
      <ul id="menu-list"></ul>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
